### MY PROGRAMS ###
# See https://wiki.hyprland.org/Configuring/Keywords/
# Set programs that you use
$TD = /usr/bin/zeditor
$menu = rofi -show run
$dol = XDG_MENU_PREFIX=arch- kbuildsycoca6 & notify-send Fixing_files
# kbuildsycoca5 --noincremental
# sudo pacman -S archlinux-xdg-menu #for when the idioit doesn't work'
$mico = $TD ~/.config/hypr/ & notify-send "Hyprland folder"
$rofie = ~/.config/hypr/rofi/scripts/raofi.sh
$micoD = dolphin ~/.config/hypr/ & notify-send "Hyprland folder in dolphin"
$lockconf = zeditor ~/.config/hypr/hyprlock.conf & notify-send "Locking Now"
$scrn = ~/.config/hypr/s.sh
$scrnW = hyprshot -m window
### AUTOSTART ###
# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:
exec-once = sleep 10 && syncthingtray-qt6 --wait --windowed #& syncthingtray
exec-once = systemctl --user start sunshine
exec-once = gsr-ui #gpy screen recorder ui, now on both laptop and pc
exec-once = wl-paste --type text --watch cliphist store && wl-paste --type image --watch cliphist store #old
exec-once = sleep 14 && kdeconnect-indicator && notify-send "KDE CONNECT INT"
exec-once = /home/$USER/.config/hypr/Hyprlock_RandomBackgrounbd.sh
exec-once = xsettingsd #idk wtf this does?
exec-once = xfce4-power-manager &
xwayland {
    force_zero_scaling = true
}

exec-once = /home/$USER/.config/hypr/My_wallpapers/Change_into_random_background.sh
exec-once = nm-applet
exec-once = hypridle
exec-once = waybar
# exec-once = ./home/hamada/Desktop/adbforwarder/ADBForwarder
exec-once = $dol
# exec-once = moonlight stream 192.168.1.129:47989 Desktop
### ENVIRONMENT VARIABLES ###
# See https://wiki.hyprland.org/Configuring/Environment-variables/
envd = HYPRCURSOR_SIZE,15
envd = XCURSOR_SIZE,15
envd = QT_CURSOR_SIZE,15

env = WLR_RENDERER,vulkan
env = WLR_NO_HARDWARE_CURSORS,1
env = __GLX_VENDOR_LIBRARY_NAME,mesa

# XDG Specifications
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = XDG_MENU_PREFIX,plasma-
#
env = GDK_BACKEND, wayland, x11, *
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORM, wayland;xcb
env = SDL_VIDEODRIVER, wayland,x11
env = CLUTTER_BACKEND, wayland
env = LIBVA_DRIVER_NAME, nvidia
env = NVD_BACKEND, direct
env = __GL_GSYNC_ALLOWED, 1
env = __GL_VRR_ALLOWED, 1
env = ELECTRON_OZONE_PLATFORM_HINT, auto
env = GBM_BACKEND, nvidia-drm
env = __NV_PRIME_RENDER_OFFLOAD, 1
env = __VK_LAYER_NV_optimus, NVIDIA_only
env = WLR_DRM_NO_ATOMIC,1
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = GTK_THEME,
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_SCALE_FACTOR,1
env = QT_QPA_PLATFORM=wayland

env = GBM_BACKEND,nvidia-drm

# NVIDIA
env = __GLX_VENDOR_LIBRARY_NAME, nvidia

# Qt Variables
env = QT_AUTO_SCREEN_SCALE_FACTOR=1
exec-once = nm-applet --indicator
exec-once = systemctl --user start hyprpolkitagent
exec-once = udiskie -T --appindicator
exec-once = /usr/bin/kwalletd5
exec-once = mpv --volume=200 /home/ahmed/recordings/deck_ui_launch_game.wav

cursor {
    no_hardware_cursors = true
}
general {
    gaps_in = 1
    gaps_out = 5

    border_size = 1
    # no_border_on_floating = true

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
    # snap {
    #     enabled = true
    # }
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = false
        size = 15
        xray = true
        passes = 1

        vibrancy = 0.1696
    }
     shadow {
        enabled = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true
    # enabled = false

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    # animation = windowsIn, 1, 4, overshot, slide
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 5, default
    animation = workspacesIn, 1, 6, overshot, slide
    animation = workspacesOut, 1, 6, overshot, slidefade 80%
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}
# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    # animate_manual_resizes = true
    # animate_mouse_windowdragging = true
    vfr = true
}
#############
### INPUT ###
#############
# https://wiki.hyprland.org/Configuring/Variables/#input
# input {
#     kb_layout = us
#     kb_variant =
#     kb_model =
#     kb_options =
#     kb_rules =
input {
    kb_layout = us,ara  # Specifies US and Arabic keyboard layouts
    kb_variant = ,       # No specific variants are used
    kb_options = grp:win_space_toggle  # Sets Super + Space as the toggle

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = false
        middle_button_emulation = true
        disable_while_typing = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gesture = 3, horizontal, workspace
gesture = 3, down, dispatcher, exec, hyprshot -m output -m active --o $HOME/Pictures/Screenshots
gesture = 4, left, dispatcher, movewindow, l
gesture = 4, right, dispatcher, movewindow, r
gesture = 4, up, dispatcher, movewindow, u
gesture = 4, down, dispatcher, movewindow, d
# gesture = 3, up, dispatcher, movefocus, u
# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
