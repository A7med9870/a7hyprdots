windowrule {
  name = windowrule-18
  pin = on
  match:title = ^(danmufloat)$
}

windowrule {
  name = windowrule-19
  rounding = 5
  match:title = ^(danmufloat|termfloat)$
}


windowrule {
  name = windowrule-21
  no_blur = on
  match:class = ^(org.mozilla.firefox)$
}

windowrule {
  name = windowrule-22
  border_size = 2
  border_color = $cachylblue
  rounding = 8
  match:float = 1
  match:workspace = w[fv1-10]
}

windowrule {
  name = windowrule-23
  border_size = 3
  rounding = 4
  match:float = 0
  match:workspace = f[1-10]
}

workspace = 1, default:true, monitor:$priMon
workspace = 6, default:true, monitor:$secMon
workspace = r[1-5], monitor:$priMon
workspace = r[6-10], monitor:$secMon
workspace = special:scratchpad, on-created-empty:$applauncher
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule {
  name = windowrule-24
  border_size = 0
  rounding = 0
  match:float = 0
  match:workspace = w[tv1]
}

windowrule {
  name = windowrule-25
  border_size = 0
  rounding = 0
  match:float = 0
  match:workspace = f[1]
}
