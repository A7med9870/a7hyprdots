}

windowrule {
  name = windowrule-10
  float = on
  match:class = ^(zenity)$
}

windowrule {
  name = windowrule-11
  float = on
  match:class = ^()$
  match:title = ^(Steam - Self Updater)$
}

windowrule {
  name = windowrule-12
  opacity = 0.92
  move = 100 100
