  opacity = 0.95
  match:title = ^(NetEase Cloud Music Gtk4)$
}

windowrule {
  name = windowrule-16
  float = on
  size = 960 540
  move = ((monitor_w*0.25)-)
  match:title = ^(Picture-in-Picture)$
}

windowrule {
  name = windowrule-17
  float = on
  move = ((monitor_w*0.25)-)
  size = 960 540
  match:title = ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
