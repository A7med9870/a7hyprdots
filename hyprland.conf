bind = SUPER_ALT, KP_End, movewindow, l
bind = SUPER_ALT, W, movewindow, u
bind = SUPER_ALT, S, movewindow, d
bind = SUPER_ALT, D, movewindow, r
bind = SUPER SHIFT, KP_End, movetoworkspace, 1
bind = SUPER SHIFT, KP_Down, movetoworkspace, 2
bind = SUPER SHIFT, KP_Next, movetoworkspace, 3
bind = SUPER SHIFT, KP_Left, movetoworkspace, 4
bind = SUPER SHIFT, KP_Begin, movetoworkspace, 5
bind = SUPER SHIFT, KP_Right, movetoworkspace, 6
bind = SUPER SHIFT, KP_Home, movetoworkspace, 7
bind = SUPER SHIFT, KP_Up, movetoworkspace, 8
bind = SUPER SHIFT, KP_Prior, movetoworkspace, 9
bind = SUPER SHIFT, KP_Insert, movetoworkspace, 10
# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic
# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
# bind = $mainMod SHIFT, right, workspace, e+1
bind = $mainMod CTRL, right, workspace, e+1

bind = $mainMod CTRL, D, workspace, e+1
bind = $mainMod CTRL, A, workspace, e-1
bind = $mainMod CTRL SHIFT, right, movetoworkspace, e+1
bind = $mainMod CTRL SHIFT, left, movetoworkspace, e-1

bind = $mainMod CTRL SHIFT, D, movetoworkspace, e+1
bind = $mainMod CTRL SHIFT, A, movetoworkspace, e-1
bind = $mainMod CTRL, left, workspace, e-1
# bind = $mainMod SHIFT, left, workspace, e-1
bind = $mainMod, mouse_up, workspace, e-1
# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
#Other mouse keys
# bind = $mainMod, mouse:276   , exec, hyprctl dispatch centerwindow
# bind = $mainMod, mouse:275   , exec, hyprctl dispatch centerwindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ #& notify-send "Opening Steam"
# bindel = SUPER ,XF86AudioRaiseVolume, exec, notify-send "Opening Steam"
bindel = SUPER ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%+
bindel = SUPER ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%-
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindel = SUPER_SHIFT_ALT ,up, exec, ddcutil setvcp 10 + 10  # Increase by 10%
bindel = SUPER_SHIFT_ALT ,down, exec, ddcutil setvcp 10 - 10  # Increase by 10%

bindel = SUPER_SHIFT ,space, exec, playerctl play-pause
# bindel = SUPER_SHIFT_ALT ,up, exec, brightnessctl s 10%+
# bindel = SUPER_SHIFT_ALT ,down, exec, brightnessctl s 10%-
# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = SUPER, mouse:274, exec, playerctl play-pause
# bindl = SUPER , XF86AudioPause, exec, playerctl play-pause
bindl = SUPER , XF86AudioPause, exec, notify-send "Opening Steam"
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

