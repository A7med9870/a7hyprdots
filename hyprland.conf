windowrule {
  name = move-kitty
  match:class = Alacritty

  move = 100 100
  animation = popin
}
windowrule {
  name = move-dol
  match:class = Dolphin

  move = 100 100
  animation = popin
}

windowrule {
  name = windowrule-1
  # float = on
  match:class = ^(org.pulseaudio.pavucontrol)
}

windowrule {
  name = windowrule-2
  float = on
  match:class = ^()$
  match:title = ^(Picture in picture)$
}

windowrule {
  name = windowrule-3
  float = on
  match:class = ^()$
  match:title = ^(Save File)$
}

windowrule {
  name = windowrule-4
  float = on
  match:class = ^()$
  match:title = ^(Open File)$
}

windowrule {
  name = windowrule-5
  float = on
  match:class = ^(LibreWolf)$
  match:title = ^(Picture-in-Picture)$
}

windowrule {
  name = windowrule-6
  float = on
  match:class = ^(blueman-manager)$
}

windowrule {
  name = windowrule-7
