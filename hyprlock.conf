# Cyberpunk Theme
background {
    monitor =
    path = /tmp/hyprlock_background.jxl
    color = rgba(0, 0, 0, 0.6)
    blur_passes = 0
    blur_size = 5
    contrast = 1.5
    vibrancy = 0.5
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M:%S')"
    color = rgba(0, 255, 255, 0.9)
    font_size = 70
    font_family = "Fira Code Retina"
    position = 0, -200
    halign = center
    valign = top
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%Y-%m-%d • %A')"
    color = rgba(255, 50, 255, 0.8)
    font_size = 20
    font_family = "Fira Code"
    position = 0, -120
    halign = center
    valign = top
}

input-field {
    monitor =
    size = 280, 55
    outline_thickness = 3
    outer_color = rgb(0, 255, 255)
    inner_color = rgba(0, 0, 0, 0.3)
    font_color = rgb(255, 255, 255)
    placeholder_text = ACCESS CODE
    position = 0, -50
    halign = center
    valign = top
}
